# Manual backfill: run the extraction from a GitHub runner instead of Lambda.
# Files land in S3 and Snowpipe ingests them automatically — no load step needed.
# Trigger from the Actions tab ("Run workflow").
name: manual-extract

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests boto3

      - name: Extract Steam data to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_REGION: us-east-1
        run: python extract_steam.py
